<title>ScoreKeeper</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1f3a52;--surface:#2e5470;--surface2:#254d68;--border:rgba(100,160,220,0.2);
  --accent:#4da3ff;--accent2:#7bc0ff;--text:#e8f4ff;--muted:rgba(180,215,245,0.55);
  --dim:rgba(180,215,245,0.28);--shadow:0 2px 10px rgba(0,0,0,0.25);
  --r:16px;--rs:11px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;transition:all .15s}
button:active{transform:scale(.97)}
input,select{font-family:'Outfit',sans-serif;font-size:15px}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none}
.page.active{display:block}
.inner{padding:0 16px calc(16px + var(--safe-bot))}

/* NAV */
nav{flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,.3)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px calc(10px + var(--safe-bot));background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.nb.on{color:var(--accent)}
.nb-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .2s}
.nb.on .nb-dot{opacity:1}

/* HEADER */
.hdr{padding:calc(var(--safe-top) + 20px) 16px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.hdr-logo{width:36px;height:36px;border-radius:10px;object-fit:contain}
h1{font-size:26px;font-weight:800;letter-spacing:-.03em}
.sub{font-size:12px;color:var(--muted);margin-top:1px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.ctitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--rs);font-weight:600;font-size:15px;padding:13px 18px}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(77,163,255,.3)}
.btn-p:hover{background:#3d8fe0}
.btn-s{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);box-shadow:var(--shadow)}
.btn-d{background:rgba(220,38,38,.08);color:#dc2626;border:1px solid rgba(220,38,38,.2)}
.btn-g{background:none;color:var(--muted);border:none}
.btn-full{width:100%}
.btn-sm{padding:7px 13px;font-size:13px}
.btn-ico{width:38px;height:38px;padding:0;border-radius:10px}
.btn[disabled]{opacity:.45;pointer-events:none}

/* INPUTS */
.inp{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:16px;padding:13px 15px;-webkit-appearance:none;outline:none;box-shadow:var(--shadow)}
.inp:focus{border-color:var(--accent2)}
.inp::placeholder{color:var(--dim)}
.lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
.fg{margin-bottom:15px}

/* TABS */
.tabbar{display:flex;gap:4px;background:var(--surface2);border-radius:13px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px;text-align:center;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:none;font-family:'Outfit',sans-serif}
.tab.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* RANK */
.rank-item{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow)}
.rank-item.r1{background:linear-gradient(135deg,#2a2800,#332e00);border-color:#c8a000}
.rank-item.r2{background:linear-gradient(135deg,#252530,#1e1e2a);border-color:#6060a0}
.rank-item.r3{background:linear-gradient(135deg,#2a1800,#301e00);border-color:#a05020}
.rank-badge{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:'DM Mono',monospace;flex-shrink:0}
.rb1{background:rgba(245,200,66,.2);color:#f5c842}
.rb2{background:rgba(180,180,200,.2);color:#a0a0c0}
.rb3{background:rgba(212,149,106,.2);color:#d4956a}
.rbn{background:var(--surface2);color:var(--muted)}
.rank-name{flex:1;font-weight:600;font-size:15px}
.rank-score{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}

/* SCORE ROW */
.score-row{display:flex;align-items:center;gap:11px;padding:13px 15px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s}
.score-row:active{border-color:var(--accent)}
.sr-name{flex:1;font-weight:600;font-size:15px}
.sr-rounds{font-size:11px;color:var(--muted)}
.sr-total{font-family:'DM Mono',monospace;font-size:21px;min-width:55px;text-align:right}
.sr-arr{font-size:17px;color:var(--muted);margin-left:4px}

/* AVATAR */
.av{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.av0{background:#1e3a52}.av1{background:#19304a}.av2{background:#1c3850}.av3{background:#163548}.av4{background:#142e46}.av5{background:#122a40}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ba{background:rgba(77,163,255,.15);color:#7bc0ff;border:1px solid rgba(77,163,255,.3)}
.bb{background:rgba(120,140,255,.15);color:#a0b4ff;border:1px solid rgba(120,140,255,.3)}

/* STATUS BAR */
.statusbar{display:flex;align-items:center;gap:10px;padding:11px 15px;background:rgba(29,184,122,.12);border:1px solid rgba(29,184,122,.3);border-radius:var(--rs);margin-bottom:16px}
.sdot{width:8px;height:8px;border-radius:50%;background:#1db87a;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* SECTION LABEL */
.slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:18px 0 9px}

/* STAT CARD */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow)}
.sv{font-family:'DM Mono',monospace;font-size:26px;color:var(--accent)}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600}

/* HISTORY */
.hist{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.hist:active{border-color:var(--accent2)}
.hist-name{font-size:16px;font-weight:700}
.hist-meta{font-size:12px;color:var(--muted);margin-top:3px}
.hist-winner{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}

/* NUMPAD */
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.nk{height:62px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:23px;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);transition:all .12s}
.nk:active{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(.95)}
.ndisp{background:rgba(0,0,0,.2);border:1.5px solid var(--border);border-radius:13px;padding:15px;text-align:center;font-family:'DM Mono',monospace;font-size:44px;min-height:74px;display:flex;align-items:center;justify-content:center}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.sheet{background:var(--surface);border-radius:26px 26px 0 0;padding:22px 18px calc(22px + var(--safe-bot));width:100%;max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -8px 40px rgba(0,0,0,.5)}
.handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;margin:0 auto 18px}
.mtitle{font-size:19px;font-weight:700;margin-bottom:18px}

/* ACTIVE BANNER */
.active-banner{background:rgba(77,163,255,.1);border:1px solid rgba(77,163,255,.2);border-radius:13px;padding:13px 15px;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between}

/* ROUND PILL */
.rpill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border);border-radius:99px;padding:6px 13px;font-size:13px;font-weight:700;box-shadow:var(--shadow)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:10px}
.empty-ico{font-size:46px;margin-bottom:6px}

/* TABLE */
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{text-align:left;padding:5px 7px;color:var(--muted);font-weight:600}
.dtable td{padding:9px 7px;border-top:1px solid var(--border);font-family:'DM Mono',monospace}
.dtable td:first-child{font-family:'Outfit',sans-serif;font-weight:600}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:99px;font-size:13px;font-weight:500;box-shadow:var(--shadow)}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;z-index:200;border-radius:2px;animation:cffall 3s ease-in forwards}
@keyframes cffall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both}
</style>
</head>

// ── UTILS ──────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2)}
function today(){return new Date().toISOString().split("T")[0]}
function fmtDate(d){if(!d)return"";const[y,m,day]=d.split("-");return day+"/"+m+"/"+y}
function avClass(p){return"av "+(p.color||"av0")}
function rankClass(i){return"rank-item"+(i===0?" r1":i===1?" r2":i===2?" r3":"")}
function rankBadge(i){return i===0?"\ud83e\udd47":i===1?"\ud83e\udd48":i===2?"\ud83e\udd49":"#"+(i+1)}
function badgeClass(i){return"rank-badge "+(i===0?"rb1":i===1?"rb2":i===2?"rb3":"rbn")}
function col(total){return total>0?"var(--accent)":total<0?"#dc2626":"var(--text)"}
function el(tag,cls,html,attrs){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(html)e.innerHTML=html;
  if(attrs)Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e
}
function div(cls,html){return el("div",cls,html)}
function btn(cls,text,fn){const b=el("button",cls,text);b.onclick=fn;return b}
function confetti(){
  const cols=["#e8400c","#4c5fd5","#f5c842","#1db87a","#e8a00c","#c026d3"];
  for(let i=0;i<40;i++){
    const d=document.createElement("div");
    d.className="cf";
    d.style.cssText="left:"+(Math.random()*100)+"%;top:-20px;width:"+(6+Math.random()*10)+"px;height:"+(6+Math.random()*10)+"px;background:"+cols[Math.floor(Math.random()*cols.length)]+";animation-delay:"+(Math.random()*1.5)+"s;border-radius:"+(Math.random()>.5?"50%":"2px");
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3500);
  }
}

// ── MODAL ──────────────────────────────────────────────────
function showModal(buildFn){
  const root=document.getElementById("modal-root");
  const overlay=div("overlay");
  const sheet=div("sheet");
  const handle=div("handle");
  sheet.appendChild(handle);
  buildFn(sheet,()=>{overlay.remove()});
  overlay.appendChild(sheet);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove()};
  root.appendChild(overlay);
}

let currentTab="home";
function buildNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  TABS.forEach(t=>{
    const b=document.createElement("button");
    b.className="nb"+(currentTab===t.id?" on":"");
    const lbl=t.id==="game"&&D.current?"● Partie":t.lbl;
    b.innerHTML=`<svg viewBox="0 0 24 24"><path d="${t.ico}" stroke-linecap="round" stroke-linejoin="round"/></svg><span>${lbl}</span><div class="nb-dot"></div>`;
    b.onclick=()=>goTab(t.id);
    nav.appendChild(b);
  });
}
function goTab(id){
  currentTab=id;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("p-"+id).classList.add("active");
  buildNav();
  renderPage(id);
}

// ── RENDER ──────────────────────────────────────────────────
function render(){buildNav();renderPage(currentTab)}
function renderPage(id){
  const pg=document.getElementById("p-"+id);
  pg.innerHTML="";
  if(id==="home") buildHome(pg);
  else if(id==="game") buildGame(pg);
  else if(id==="history") buildHistory(pg);
  else if(id==="stats") buildStats(pg);
  else if(id==="settings") buildSettings(pg);
}

function buildHome(pg){

// ── NUMPAD ──────────────────────────────────────────────────
function showNumpad(player){
  let val="",neg=false;
  showModal((sheet,close)=>{
    const head=div("",`<div style="display:flex;align-items:center;gap:11px;margin-bottom:18px">
      <div class="${avClass(player)}">${player.emoji}</div>
      <div style="font-size:18px;font-weight:700;flex:1">${player.name}</div>
      <div style="font-size:13px;color:var(--muted)">Total: ${player.total}</div>
    </div>`);
    sheet.appendChild(head);

    const disp=div("ndisp","0");
    disp.style.color="var(--accent)";
    sheet.appendChild(disp);
    sheet.appendChild(div("",`<div style="text-align:center;font-size:12px;color:var(--muted);margin:5px 0 2px">points pour cette manche</div>`));

    function refresh(){
      const display=val===""?"0":(neg?"-":"+")+val;
      disp.textContent=display;
      disp.style.color=neg?"#dc2626":"var(--accent)";
    }

    const grid=div("numpad-grid");
    ["1","2","3","4","5","6","7","8","9","±","0","⌫"].forEach(k=>{
      const b=el("button","nk",k);
      b.onclick=()=>{
        if(k==="⌫"){val=val.slice(0,-1)}
        else if(k==="±"){neg=!neg}
        else if(val.length<5){val+=k}
        refresh();
      };
      grid.appendChild(b);
    });
    sheet.appendChild(grid);

    const cb=btn("btn btn-p btn-full","Valider",()=>{
      const n=parseInt(val||"0");
      const score=neg?-n:n;
      upd(d=>{
        const s={...d.current};
        const currentRound=s.round;
        s.players=s.players.map(p=>{
          if(p.id!==player.id)return p;
          const scores=[...p.scores,{r:currentRound,v:score}];
          return{...p,scores,total:scores.reduce((a,b)=>a+b.v,0)};
        });
        return{...d,current:s};
      });
      close();
    });
    cb.style.marginTop="14px";
    sheet.appendChild(cb);
  });
}

// ── HISTORY ──────────────────────────────────────────────────
let histDetail=null;
function buildHistory(pg){
  const wrap=div("inner");
  pg.appendChild(wrap);
  if(histDetail){buildHistDetail(wrap,histDetail,()=>{histDetail=null;buildHistory(pg)});return;}
  const sessions=[...D.sessions].reverse();
  const hdr=div("hdr");
  hdr.innerHTML=`<div><h1>Historique</h1><div class="sub">${D.sessions.length} partie${D.sessions.length>1?"s":""}</div></div>`;
  wrap.appendChild(hdr);

  const si=el("input","inp","",{type:"search",placeholder:"\ud83d\udd0d Rechercher un jeu…"});
  si.style.marginBottom="14px";
  wrap.appendChild(si);

  const listWrap=div("");
  wrap.appendChild(listWrap);

  function renderList(filter){
    listWrap.innerHTML="";
    const filtered=sessions.filter(s=>s.gameName.toLowerCase().includes(filter.toLowerCase()));
    if(!filtered.length){
      const em=div("empty");
      em.innerHTML=`<div class="empty-ico">\ud83d\udcdc</div><div style="font-weight:700;font-size:18px">Aucune partie</div><div style="font-size:14px;color:var(--muted)">Les parties terminées apparaîtront ici.</div>`;
      listWrap.appendChild(em);return;
    }
    const grouped={};
    filtered.forEach(s=>{if(!grouped[s.gameName])grouped[s.gameName]=[];grouped[s.gameName].push(s);});
    Object.entries(grouped).forEach(([game,sess])=>{
      const gh=div("",`<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><div class="slbl" style="margin:0">${game}</div><div class="badge bb">${sess.length} partie${sess.length>1?"s":""}</div></div>`);
      listWrap.appendChild(gh);
      sess.forEach(s=>{
        const winner=[...s.players].sort((a,b)=>b.total-a.total)[0];
        const card=div("hist");
        card.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between">
          <div class="hist-name">${s.gameName}</div>
          <div style="font-size:12px;color:var(--muted)">${fmtDate(s.date)}</div>
        </div>
        <div class="hist-meta">${s.players.length} joueurs · ${Math.max(...s.players.map(p=>p.scores.length),0)} manches</div>
        ${winner?`<div class="hist-winner">
          <span style="font-size:13px;color:var(--muted)">Gagnant :</span>
          <div class="${avClass(winner)}">${winner.emoji}</div>
          <span style="font-weight:700;font-size:14px">${winner.name}</span>
          <span style="margin-left:auto;font-family:DM Mono,monospace;color:var(--accent);font-weight:700">${winner.total} pts</span>
        </div>`:""}`;
        card.onclick=()=>{histDetail=s;buildHistory(pg)};
        listWrap.appendChild(card);
      });
    });
  }
  si.oninput=()=>renderList(si.value);
  renderList("");
}

function buildHistDetail(wrap,s,back){
  const sorted=[...s.players].sort((a,b)=>b.total-a.total);
  const hdr=div("hdr");
  const bb=btn("btn btn-g","← Retour",back);
  bb.style.padding="8px 0";
  const acts=div("",`<div style="display:flex;gap:7px"></div>`);
  const share=btn("btn btn-s btn-sm","Partager \ud83d\udce4",()=>{
    const text="\ud83c\udfc6 "+s.gameName+" — "+fmtDate(s.date)+"\n\n"+sorted.map((p,i)=>rankBadge(i)+" "+p.name+": "+p.total+" pts").join("\n");
    if(navigator.share)navigator.share({title:s.gameName,text});
    else if(navigator.clipboard){navigator.clipboard.writeText(text);alert("Résultats copiés !");}
  });
  const del=btn("btn btn-d btn-sm","\ud83d\uddd1",()=>{
    if(confirm("Supprimer cette partie ?"))upd(d=>({...d,sessions:d.sessions.filter(x=>x.id!==s.id)}));
    back();
  });
  acts.firstChild.appendChild(share);acts.firstChild.appendChild(del);
  hdr.appendChild(bb);hdr.appendChild(acts.firstChild);
  wrap.appendChild(hdr);
  wrap.appendChild(div("",`<div style="margin-bottom:18px"><div style="font-size:24px;font-weight:800;letter-spacing:-.02em">${s.gameName}</div><div style="font-size:13px;color:var(--muted);margin-top:3px">${fmtDate(s.date)} · ${s.players.length} joueurs</div></div>`));
  wrap.appendChild(div("slbl","Classement final"));
  sorted.forEach((p,i)=>{
    const row=div(rankClass(i));
    row.innerHTML=`<div class="${badgeClass(i)}">${rankBadge(i)}</div><div class="${avClass(p)}">${p.emoji}</div><div class="rank-name">${p.name}</div><div class="rank-score" style="color:${col(p.total)}">${p.total}</div>`;
    wrap.appendChild(row);
  });
  wrap.appendChild(div("slbl","Détail des manches"));
  const card=div("card");
  const maxR=s.round||Math.max(...s.players.map(p=>p.scores.length),1);
  let th=`<tr><th>Joueur</th>`;
  for(let i=1;i<=maxR;i++)th+=`<th style="text-align:center">M${i}</th>`;
  th+=`<th style="text-align:right;color:var(--accent)">Total</th></tr>`;
  let tbody="";
  s.players.forEach(p=>{
    let row=`<tr><td>${p.emoji} ${p.name}</td>`;
    for(let i=1;i<=maxR;i++){
      const entry=Array.isArray(p.scores)&&typeof p.scores[0]==="object"?p.scores.find(sc=>sc.r===i):undefined;
      const legacyVal=Array.isArray(p.scores)&&typeof p.scores[i-1]==="number"?p.scores[i-1]:undefined;
      const v=entry?entry.v:legacyVal;
      row+=v!==undefined?`<td style="text-align:center;color:${v<0?"#dc2626":"var(--text)"}">${v>0?"+":""}${v}</td>`:`<td style="text-align:center;color:var(--dim)">—</td>`;
    }
    const total=Array.isArray(p.scores)?p.scores.reduce((a,b)=>a+(typeof b==="object"?b.v:b),0):0;
    row+=`<td style="text-align:right;color:${col(total)};font-weight:700">${total}</td></tr>`;
    tbody+=row;
  });
  const tbl=el("table","dtable");tbl.innerHTML=th+tbody;
  const ow=div("");ow.style.overflowX="auto";ow.appendChild(tbl);card.appendChild(ow);
  wrap.appendChild(card);
}

let statsView="games";
function buildStats(pg){
  pg.innerHTML="";
  const wrap=div("inner");
  pg.appendChild(wrap);
  const hdr=div("hdr");
  hdr.innerHTML=`<div><h1>Statistiques</h1><div class="sub">${D.sessions.length} parties</div></div>`;
  wrap.appendChild(hdr);
  if(!D.sessions.length){
    const em=div("empty");
    em.innerHTML=`<div class="empty-ico">\ud83d\udcca</div><div style="font-weight:700;font-size:18px">Pas encore de stats</div><div style="font-size:14px;color:var(--muted)">Jouez des parties pour voir vos statistiques.</div>`;
    wrap.appendChild(em);return;
  }
  const tb=div("tabbar");
  ["games","players"].forEach(t=>{
    const b=el("button","tab"+(statsView===t?" on":""),t==="games"?"Par jeu":"Par joueur");
    b.onclick=()=>{statsView=t;buildStats(pg)};
    tb.appendChild(b);
  });
  wrap.appendChild(tb);

  if(statsView==="games"){
    const map={};
    D.sessions.forEach(s=>{
      if(!map[s.gameName])map[s.gameName]={name:s.gameName,played:0,players:{}};
      const g=map[s.gameName];g.played++;
      const sorted=[...s.players].sort((a,b)=>b.total-a.total);
      sorted.forEach((p,i)=>{
        if(!g.players[p.name])g.players[p.name]={scores:[],wins:0};
        g.players[p.name].scores.push(p.total);
        if(i===0)g.players[p.name].wins++;
      });
    });
    Object.values(map).forEach(g=>{
      const card=div("card");
      card.style.marginBottom="12px";
      const best=Object.entries(g.players).sort((a,b)=>b[1].wins-a[1].wins)[0];
      const avg=Object.entries(g.players).map(([n,p])=>({name:n,avg:p.scores.reduce((a,b)=>a+b,0)/p.scores.length})).sort((a,b)=>b.avg-a.avg);
      let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-size:17px;font-weight:700">${g.name}</div><div class="badge ba">${g.played} partie${g.played>1?"s":""}</div></div>`;
      if(best)html+=`<div style="background:rgba(77,163,255,.1);border:1px solid rgba(77,163,255,.2);border-radius:10px;padding:10px 13px;margin-bottom:11px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Meilleur joueur</div><div style="font-weight:700;font-size:14px">\ud83c\udfc6 ${best[0]} — ${best[1].wins} victoire${best[1].wins>1?"s":""}</div></div>`;
      html+=`<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px">Score moyen</div>`;
      avg.forEach(({name,avg},i)=>{
        html+=`<div style="display:flex;align-items:center;gap:9px;margin-bottom:5px"><div style="width:18px;font-size:12px;color:var(--muted)">${i+1}.</div><div style="flex:1;font-size:14px">${name}</div><div style="font-family:DM Mono,monospace;font-size:14px;color:${avg>=0?"var(--accent)":"#dc2626"}">${avg.toFixed(1)}</div></div>`;
      });
      card.innerHTML=html;
      wrap.appendChild(card);
    });
  }

  if(statsView==="players"){
    const map={};
    D.players.forEach(p=>{map[p.name]={...p,played:0,wins:0,total:0,gameWins:{}}});
    D.sessions.forEach(s=>{
      const sorted=[...s.players].sort((a,b)=>b.total-a.total);
      sorted.forEach((p,i)=>{
        if(!map[p.name])map[p.name]={...p,played:0,wins:0,total:0,gameWins:{}};
        const m=map[p.name];m.played++;m.total+=p.total;
        if(i===0){m.wins++;m.gameWins[s.gameName]=(m.gameWins[s.gameName]||0)+1;}
      });
    });
    Object.values(map).filter(p=>p.played>0).sort((a,b)=>b.wins-a.wins).forEach((p,i)=>{
      const wr=p.played>0?Math.round(p.wins/p.played*100):0;
      const fav=Object.entries(p.gameWins).sort((a,b)=>b[1]-a[1])[0];
      const card=div("card");card.style.marginBottom="12px";
      let html=`<div style="display:flex;align-items:center;gap:11px;margin-bottom:13px">
        <div class="${avClass(p)}" style="width:42px;height:42px;font-size:20px;border-radius:13px">${p.emoji}</div>
        <div><div style="font-size:17px;font-weight:700">${p.name}</div><div style="font-size:12px;color:var(--muted)">${p.played} partie${p.played>1?"s":""}</div></div>
        ${i===0?`<div class="badge ba" style="margin-left:auto">Top joueur</div>`:""}
      </div>
      <div class="g3" style="margin-bottom:11px">
        <div class="stat-card"><div class="sv">${p.wins}</div><div class="sl">Victoires</div></div>
        <div class="stat-card"><div class="sv">${wr}%</div><div class="sl">Win rate</div></div>
        <div class="stat-card"><div class="sv" style="font-size:22px">${p.played>0?Math.round(p.total/p.played):0}</div><div class="sl">Moy.</div></div>
      </div>
      ${fav?`<div style="font-size:13px;color:var(--muted)">\ud83c\udfae Meilleur à : <strong style="color:var(--text)">${fav[0]}</strong> (${fav[1]} victoire${fav[1]>1?"s":""})</div>`:""}`;
      card.innerHTML=html;
      wrap.appendChild(card);
    });
  }
}

// ── SETTINGS ──────────────────────────────────────────────────
function buildSettings(pg){
  const wrap=div("inner");
  pg.appendChild(wrap);
  const hdr=div("hdr");
  hdr.innerHTML=`<div><h1>Réglages</h1><div class="sub">Joueurs & jeux</div></div>`;
  wrap.appendChild(hdr);

  // Players
  wrap.appendChild(div("slbl","Joueurs ("+D.players.length+")"));
  const pc=div("card");
  let selEmoji="\ud83c\udfae";
  const addRow=div("",`<div style="display:flex;gap:7px;margin-bottom:11px"></div>`);
  const emojiBtn=el("button","btn btn-s btn-ico","",{});
  emojiBtn.textContent=selEmoji;
  emojiBtn.style.width="50px";emojiBtn.style.height="50px";emojiBtn.style.fontSize="22px";
  emojiBtn.onclick=()=>{
    showModal((sheet,close)=>{
      sheet.appendChild(div("mtitle","Choisir un emoji"));
      const grid=div("");grid.style.cssText="display:flex;flex-wrap:wrap;gap:9px";
      EMOJIS.forEach(em=>{
        const b=el("button","nk",em,{});
        b.style.cssText="width:52px;height:52px;font-size:24px;border-radius:13px";
        b.onclick=()=>{selEmoji=em;emojiBtn.textContent=em;close()};
        grid.appendChild(b);
      });
      sheet.appendChild(grid);
    });
  };
  const nameInp=el("input","inp","",{type:"text",placeholder:"Nom du joueur…"});
  nameInp.style.flex="1";
  const addBtn=btn("btn btn-p btn-sm","+",()=>{
    if(!nameInp.value.trim())return;
    const color=AVCOLORS[D.players.length%AVCOLORS.length];
    upd(d=>({...d,players:[...d.players,{id:uid(),name:nameInp.value.trim(),emoji:selEmoji,color}]}));
    nameInp.value="";selEmoji="\ud83c\udfae";emojiBtn.textContent=selEmoji;
  });
  nameInp.onkeydown=e=>{if(e.key==="Enter")addBtn.click()};
  addRow.firstChild.appendChild(emojiBtn);addRow.firstChild.appendChild(nameInp);addRow.firstChild.appendChild(addBtn);
  pc.appendChild(addRow.firstChild);
  D.players.forEach(p=>{
    const row=div("",`<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--border)">
      <div class="${avClass(p)}">${p.emoji}</div>
      <span style="flex:1;font-weight:500">${p.name}</span>
    </div>`);
    const rb=btn("btn btn-g btn-sm","✕",()=>upd(d=>({...d,players:d.players.filter(x=>x.id!==p.id)})));
    rb.style.color="#dc2626";
    row.firstChild.appendChild(rb);
    pc.appendChild(row.firstChild);
  });
  wrap.appendChild(pc);

  // Games
  wrap.appendChild(div("slbl","Jeux ("+D.games.length+")"));
  const gc=div("card");
  const gadd=div("",`<div style="display:flex;gap:7px;margin-bottom:11px"></div>`);
  const ginp=el("input","inp","",{type:"text",placeholder:"Nom du jeu…"});ginp.style.flex="1";
  const gb=btn("btn btn-p btn-sm","+",()=>{
    if(!ginp.value.trim()||D.games.includes(ginp.value.trim()))return;
    upd(d=>({...d,games:[...d.games,ginp.value.trim()]}));ginp.value="";
  });
  ginp.onkeydown=e=>{if(e.key==="Enter")gb.click()};
  gadd.firstChild.appendChild(ginp);gadd.firstChild.appendChild(gb);
  gc.appendChild(gadd.firstChild);
  const glist=div("");glist.style.cssText="display:flex;flex-wrap:wrap;gap:7px";
  D.games.forEach(g=>{
    const chip=div("chip",g+" ");
    const xb=el("button","","✕",{});
    xb.style.cssText="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 0 0 2px";
    xb.onclick=()=>upd(d=>({...d,games:d.games.filter(x=>x!==g)}));
    chip.appendChild(xb);
    glist.appendChild(chip);
  });
  gc.appendChild(glist);
  wrap.appendChild(gc);

  // Danger
  wrap.appendChild(div("slbl","Danger"));
  const db=btn("btn btn-d btn-full","\ud83d\uddd1 Effacer l'historique",()=>{
    if(confirm("Effacer tout l'historique ? Irréversible."))upd(d=>({...d,sessions:[],current:null}));
  });
  wrap.appendChild(db);
  wrap.appendChild(div("",`<div style="height:24px"></div>`));
}
