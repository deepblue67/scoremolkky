  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #2D5016;
      --grass: #4A7C2F;
      --wood: #C8854A;
      --wood-dark: #A0622A;
      --cream: #FDF6E3;
      --sand: #E8D5A3;
      --sky: #87CEEB;
      --accent: #E74C3C;
      --accent2: #F39C12;
      --white: #FFFFFF;
      --text: #2C1810;
      --muted: #7A6A5A;
      --shadow: rgba(0,0,0,0.2);
      --radius: 16px;
      --radius-sm: 8px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f1e08;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== SCREENS ===== */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ===== HEADER ===== */
    .app-header {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      padding: 14px 20px 10px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      flex-shrink: 0;
    }
    .app-title {
      font-family: 'Fredoka One', cursive;
      font-size: 26px;
      color: var(--cream);
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .app-title span { color: var(--wood); }
    .header-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--cream);
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .header-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.25); }

    /* ===== SCROLLABLE CONTENT ===== */
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--cream);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .card-title {
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: var(--forest);
      margin-bottom: 14px;
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: linear-gradient(135deg, var(--grass), var(--forest));
      color: var(--white);
      box-shadow: 0 4px 14px rgba(74,124,47,0.4);
    }
    .btn-primary:active { box-shadow: 0 2px 6px rgba(74,124,47,0.3); }
    .btn-wood {
      background: linear-gradient(135deg, var(--wood), var(--wood-dark));
      color: var(--white);
      box-shadow: 0 4px 14px rgba(200,133,74,0.4);
    }
    .btn-danger {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: var(--white);
    }
    .btn-ghost {
      background: rgba(45,80,22,0.1);
      color: var(--forest);
      border: 2px solid rgba(45,80,22,0.2);
    }
    .btn-sm { padding: 8px 14px; font-size: 13px; }
    .btn-full { width: 100%; }
    .btn-lg { padding: 16px 24px; font-size: 17px; border-radius: 14px; }

    /* ===== HOME SCREEN ===== */
    .home-hero {
      padding: 28px 0 20px;
      text-align: center;
    }
    .home-hero-flag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .home-hero h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 52px;
      color: var(--cream);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .home-hero h1 span { color: var(--wood); }
    .home-hero p {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ===== FIELD DIAGRAM — pro style ===== */
    .field-diagram {
      background: #1a2e0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 22px 16px 18px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;

// GAME SCREEN
// ============================================================
function GameScreen({ teams: initialTeams, targetScore, rules, onEnd, resumeState }) {
  const { eliminationOn = true, overflowGrace = 0 } = rules || {};

  const initState = () => resumeState || {
    teams: initialTeams.map(t => ({
      ...t,
      score: 0,
      misses: 0,
      overflowStrikes: 0, // how many overflow throws used in grace period
      totalThrows: 0,
      totalScore: 0,
      maxThrow: 0,
      overflows: 0,
      eliminated: false,
      history: []
    })),
    currentTeamIdx: 0,
    selectedPins: [],
    throws: [],
    round: 1,
    startedAt: Date.now(),
    targetScore,
    rules: { eliminationOn, overflowGrace }
  };

  const [state, setState] = useState(initState);
  const [winner, setWinner] = useState(null);
  const [toast, setToast] = useState({ msg: '', show: false });
  const [eventPopup, setEventPopup] = useState(null); // { type, teamName, teamColor, data }
  const toastTimer = useRef(null);

  // Auto-save on every state change
  useEffect(() => {
    if (!winner) saveCurrentGame(state);
  }, [state, winner]);

  function showToast(msg) {
    clearTimeout(toastTimer.current);
    setToast({ msg, show: true });
    toastTimer.current = setTimeout(() => setToast(t => ({ ...t, show: false })), 2000);
  }

  function showEventPopup(type, teamName, teamColor, data) {
    setEventPopup({ type, teamName, teamColor, data });
  }

  function calcThrowScore(pins) {
    if (pins.length === 0) return 0;
    if (pins.length === 1) return pins[0];
    return pins.length;
  }

  function togglePin(pin) {
    setState(s => {
      const sel = s.selectedPins;
      const has = sel.includes(pin);
      return { ...s, selectedPins: has ? sel.filter(p => p !== pin) : [...sel, pin] };
    });
  }

  function confirmThrow() {
    setState(s => {
      const { teams, currentTeamIdx, selectedPins, throws, round } = s;
      const activeRules = s.rules || { eliminationOn, overflowGrace };
      const team = teams[currentTeamIdx];
      const score = calcThrowScore(selectedPins);

      let newScore = team.score + score;
      let overflow = false;
      let overflowStrikes = team.overflowStrikes || 0;
      let penalized = false;

      if (newScore > targetScore) {
        overflow = true;
        overflowStrikes += 1;
        if (overflowStrikes > activeRules.overflowGrace) {
          // Grace period exhausted → fall to 25
          newScore = 25;
          overflowStrikes = 0;
          penalized = true;
        } else {
          // Still in grace period → keep score before overflow, just count strike
          newScore = team.score; // score unchanged, counts as a penalty round
        }
      } else {
        overflowStrikes = 0; // successful throw resets overflow strikes
      }

      const newThrow = {
        teamIdx: currentTeamIdx, pins: [...selectedPins], points: score,
        scoreBefore: team.score, missesBefore: team.misses,
        overflow, penalized, overflowStrikesAfter: overflowStrikes
      };

      const updatedTeam = {
        ...team,
        score: newScore,
        misses: overflow ? team.misses : 0, // overflow doesn't reset miss counter
        overflowStrikes,
        totalThrows: team.totalThrows + 1,
        totalScore: team.totalScore + score,
        maxThrow: Math.max(team.maxThrow || 0, score),
        overflows: (team.overflows || 0) + (overflow ? 1 : 0),
        history: [...team.history, { pins: [...selectedPins], points: score, overflow, penalized }]
      };

      const newTeams = teams.map((t, i) => i === currentTeamIdx ? updatedTeam : t);

      if (newScore === targetScore && !overflow) {
        setTimeout(() => {
          const duration = Date.now() - (s.startedAt || Date.now());
          clearCurrentGame();
          setWinner({ team: updatedTeam, teams: newTeams, duration });
        }, 300);
      } else {
        if (penalized) {
          setTimeout(() => showEventPopup('overflow_penalized', team.name, team.color, {
            scoreBefore: team.score + score, newScore: 25, targetScore
          }), 50);
        } else if (overflow) {
          const remaining = activeRules.overflowGrace - overflowStrikes;
          setTimeout(() => showEventPopup('overflow_grace', team.name, team.color, {
            score, scoreBefore: team.score, targetScore,
            strikesUsed: overflowStrikes, graceTotal: activeRules.overflowGrace, remaining
          }), 50);
        } else {
          showToast(`+${score} → ${newScore} pts`);
        }
      }

      const nextIdx = getNextActive(newTeams, currentTeamIdx);
      const newRound = nextIdx <= currentTeamIdx ? round + 1 : round;
      return { ...s, teams: newTeams, currentTeamIdx: nextIdx, selectedPins: [], throws: [...throws, newThrow], round: newRound };
    });
  }

  function confirmMiss() {
    setState(s => {
      const { teams, currentTeamIdx, throws, round } = s;
      const activeRules = s.rules || { eliminationOn, overflowGrace };
      const team = teams[currentTeamIdx];
      const newMisses = team.misses + 1;
      const eliminated = activeRules.eliminationOn && newMisses >= 3;

      const newThrow = {
        teamIdx: currentTeamIdx, pins: [], points: 0,
        scoreBefore: team.score, missesBefore: team.misses, miss: true, eliminated
      };

      const updatedTeam = {
        ...team,
        misses: eliminated ? team.misses : newMisses,
        eliminated,
        totalThrows: team.totalThrows + 1,
        history: [...team.history, { pins: [], points: 0, miss: true }]
      };

      const newTeams = teams.map((t, i) => i === currentTeamIdx ? updatedTeam : t);

      if (eliminated) {
        setTimeout(() => showEventPopup('eliminated', team.name, team.color, {
          misses: newMisses
        }), 50);
        const active = newTeams.filter(t => !t.eliminated);
        if (active.length === 1) {
          setTimeout(() => {
            const duration = Date.now() - (s.startedAt || Date.now());
            clearCurrentGame();
            setWinner({ team: active[0], teams: newTeams, duration });
          }, 2200);
        }
      } else {
        if (activeRules.eliminationOn) {
          showToast(`❌ Raté ! (${newMisses}/3)`);
        } else {
          showToast('❌ Raté !');
        }
      }

      const nextIdx = getNextActive(newTeams, currentTeamIdx);
      const newRound = nextIdx <= currentTeamIdx ? round + 1 : round;
      return { ...s, teams: newTeams, currentTeamIdx: nextIdx, selectedPins: [], throws: [...throws, newThrow], round: newRound };
    });
  }

  function undoLast() {
    setState(s => {
      const { throws, teams } = s;
      if (throws.length === 0) return s;
      const last = throws[throws.length - 1];
      const team = teams[last.teamIdx];

      const restoredTeam = {
        ...team,
        score: last.scoreBefore,
        misses: last.missesBefore,
        eliminated: false,
        totalThrows: Math.max(0, team.totalThrows - 1),
        history: team.history.slice(0, -1)
      };

      const newTeams = teams.map((t, i) => i === last.teamIdx ? restoredTeam : t);
      showToast('↩️ Lancer annulé');
      return { ...s, teams: newTeams, currentTeamIdx: last.teamIdx, selectedPins: [], throws: throws.slice(0, -1) };
    });
  }

  function getNextActive(teams, currentIdx) {
    for (let i = 1; i <= teams.length; i++) {
      const idx = (currentIdx + i) % teams.length;
      if (!teams[idx].eliminated) return idx;
    }
    return currentIdx;
  }

  const { teams, currentTeamIdx, selectedPins, throws, round } = state;
  const currentTeam = teams[currentTeamIdx];
  const throwScore = calcThrowScore(selectedPins);

  const recentHistory = throws.slice(-8).reverse().map((t, i) => ({
    key: i,
    label: t.miss ? '✗' : t.points === 0 ? '0' : `+${t.points}`,
    type: t.miss ? 'miss' : t.points > 8 ? 'bonus' : 'normal',
    team: teams[t.teamIdx]
  }));

  if (winner) {
    return React.createElement(WinScreen, {
      winner, targetScore, onNewGame: onEnd,
      onRematch: () => { clearCurrentGame(); setWinner(null); setState(initState()); }
    });
  }

  return React.createElement('div', { className: 'screen game-layout' },
    // Contextual event popup
    eventPopup && React.createElement(EventPopup, {
      popup: eventPopup,
      onClose: () => setEventPopup(null)
    }),
    React.createElement('div', { className: 'scoreboard' },
      ...teams.map((team, i) =>
        React.createElement('div', {
          key: i,
          className: `team-score-card ${i === currentTeamIdx ? 'active' : ''} ${team.eliminated ? 'eliminated' : ''}`
        },
          i === currentTeamIdx && React.createElement('div', { className: 'active-arrow' }, '▼'),
          team.eliminated && React.createElement('div', { className: 'elim-badge' }, '❌'),
          React.createElement('div', { className: 'team-name-label', style: { color: team.color } }, team.name),
          React.createElement('div', { className: 'team-score-value' }, team.score),
          React.createElement('div', { className: 'team-score-remain' }, `reste ${targetScore - team.score}`),
          // overflow grace warning
          (team.overflowStrikes > 0) && React.createElement('div', { style:{fontSize:'11px', color:'#f39c12', fontWeight:'800', marginTop:'2px'} },
            `⚠️ ${'💥'.repeat(team.overflowStrikes)}`
          ),
          !team.eliminated && (state.rules||{eliminationOn:true}).eliminationOn && React.createElement('div', { className: 'miss-indicator' },
            [0,1,2].map(j => React.createElement('div', { key: j, className: `miss-dot ${j < team.misses ? 'filled' : ''}` }))
          )
        )
      )
    ),

    React.createElement('div', { className: 'game-main', style: { flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 } },
      React.createElement('div', { className: 'current-turn' },
        React.createElement('div', { className: 'turn-label' },
          'Tour de ', React.createElement('span', { style: { color: currentTeam.color } }, currentTeam.name),
          `  •  Round ${round}`
        )
      ),

      React.createElement('div', { className: 'pins-grid-container' },
        React.createElement('div', { className: 'pins-grid' },
          ...ACTUAL_PINS.map(pin =>
            React.createElement('button', {
              key: pin,
              className: `pin-btn ${selectedPins.includes(pin) ? 'selected' : ''}`,
              onClick: () => togglePin(pin)
            },
              React.createElement('span', { className: 'check-mark' }, '✓'),
              pin
            )
          )
        )
      ),

      React.createElement('div', { className: 'action-row' },
        React.createElement('div', { className: 'throw-score-preview' },
          React.createElement('span', { className: 'label' }, 'Score'),
          React.createElement('span', { className: 'value' }, selectedPins.length === 0 ? '—' : throwScore)
        ),
        React.createElement('button', { className: 'miss-btn', onClick: confirmMiss }, '✗ Raté'),
        React.createElement('button', {
          className: 'confirm-btn',
          disabled: selectedPins.length === 0,
          onClick: confirmThrow
        }, '✓ Valider')
      ),

      recentHistory.length > 0 && React.createElement('div', { className: 'history-strip' },
        React.createElement('span', { className: 'history-label' }, 'Récent :'),
        ...recentHistory.map(h =>
          React.createElement('div', {
            key: h.key,
            className: `history-chip ${h.type}`,
            style: { borderLeft: `3px solid ${h.team.color}` }
          }, h.label)
        )
      ),

      React.createElement('div', { className: 'undo-row' },
        React.createElement('button', {
          className: 'undo-btn', onClick: undoLast, disabled: throws.length === 0
        }, '↩ Annuler dernier lancer')
      )
    ),

    React.createElement('div', { className: `toast ${toast.show ? 'show' : ''}` }, toast.msg)
  );
}

function WinScreen({ winner, targetScore, onNewGame, onRematch }) {
  const { team, teams, duration } = winner;
  const totalThrows = team.totalThrows;
  const scoring = team.history.filter(h => !h.miss);
  const misses = team.history.filter(h => h.miss).length;
  const avgScore = scoring.length > 0 ? (team.totalScore / scoring.length).toFixed(1) : 0;
  const bestThrow = team.maxThrow || 0;

  useEffect(() => {
    addGameToHistory({
      id: Date.now(),
      date: Date.now(),
      duration,
      targetScore,
      winner: team.name,
      winnerColor: team.color,
      teams: teams.map(t => ({
        name: t.name,
        color: t.color,
        score: t.score,
        totalThrows: t.totalThrows,
        totalScore: t.totalScore,
        maxThrow: t.maxThrow || 0,
        overflows: t.overflows || 0,
        misses: t.history ? t.history.filter(h => h.miss).length : 0
      }))
    });

  return React.createElement('div', { className: 'screen' },
    React.createElement('div', { className: 'win-screen' },

    if (window.confirm('Effacer tout l\'historique ?')) {
      saveHistory([]);
      setHistory([]);
      setSelected(null);
    }

  // ---- Global stats ----
  const globalStats = React.useMemo ? React.useMemo(() => {
    if (history.length === 0) return null;
    const allTeamRecords = history.flatMap(g => g.teams || []);
    const wins = {};
    history.forEach(g => { wins[g.winner] = (wins[g.winner] || 0) + 1; });
    const topWinner = Object.entries(wins).sort((a,b) => b[1]-a[1])[0];
    const avgDuration = history.filter(g=>g.duration).reduce((a,g) => a + g.duration, 0) / (history.filter(g=>g.duration).length || 1);
    const avgRounds = history.filter(g=>g.rounds).reduce((a,g) => a + g.rounds, 0) / (history.filter(g=>g.rounds).length || 1);
    // per-player aggregated stats
    const playerStats = {};
    history.forEach(g => {
      (g.teams||[]).forEach(t => {
        if (!playerStats[t.name]) playerStats[t.name] = { name:t.name, color:t.color, games:0, wins:0, totalThrows:0, totalScore:0, maxThrow:0, overflows:0, misses:0 };
        const p = playerStats[t.name];
        p.games++;
        if (t.name === g.winner) p.wins++;
        p.totalThrows += t.totalThrows || 0;
        p.totalScore += t.totalScore || 0;
        p.maxThrow = Math.max(p.maxThrow, t.maxThrow || 0);
        p.overflows += t.overflows || 0;
        p.misses += t.misses || 0;
      });
    });
    return { topWinner, avgDuration, wins, playerStats: Object.values(playerStats), total: history.length };
  }, [history]) : null;

    React.createElement('div', { className: 'app-header' },

}

// ============================================================
// ROOT APP — with saved-game resume
// ============================================================
function App() {
  const [screen, setScreen] = useState('home');
  const [gameConfig, setGameConfig] = useState(null);
  const [resumeState, setResumeState] = useState(null);
  const [histCount, setHistCount] = useState(() => loadHistory().length);
  const [savedGame, setSavedGame] = useState(() => loadCurrentGame());

  function startGame(teams, targetScore, rules) {
    clearCurrentGame();
    setResumeState(null);
    setGameConfig({ teams, targetScore, rules });
    setScreen('game');
  }

  function resumeGame() {
    const saved = loadCurrentGame();
    if (!saved) return;
    setResumeState(saved);
    setGameConfig({ teams: saved.teams, targetScore: saved.targetScore, rules: saved.rules });
    setScreen('game');
  }

  function endGame() {
    setHistCount(loadHistory().length);
    setSavedGame(null);
    setResumeState(null);
    setScreen('home');
  }

  function goHistory() {
    setHistCount(loadHistory().length);
    setScreen('history');
  }

  useEffect(() => {
    if (screen === 'home') setSavedGame(loadCurrentGame());
  }, [screen]);

  if (screen === 'home') return React.createElement(HomeScreen, {
    onSetup: () => setScreen('setup'),
    onHistory: goHistory,
    onResume: resumeGame,
    historyCount: histCount,
    savedGame
  });
  if (screen === 'setup') return React.createElement(SetupScreen, { onBack: () => setScreen('home'), onStart: startGame });
  if (screen === 'game' && gameConfig) return React.createElement(GameScreen, { ...gameConfig, onEnd: endGame, resumeState });
  if (screen === 'history') return React.createElement(HistoryScreen, { onBack: () => setScreen('home') });
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
