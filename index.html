<!-- Service Worker registration — V20260622_1407 -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => {
      console.log('[Mölkky SW] Enregistré, scope :', reg.scope);
      // Notifie si une mise à jour est disponible
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('[Mölkky SW] Nouvelle version disponible — rechargez la page.');
          }
        });
      });
    })
    .catch(err => console.warn('[Mölkky SW] Échec enregistrement :', err));
}
</script>
